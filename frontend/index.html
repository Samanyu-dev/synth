<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth MVP — Execution Tracer</title>
    <meta name="description" content="Real-time pipeline execution tracer and AI reasoning inspector for Synth MVP.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ═══════════ METRICS BAR ═══════════ -->
    <header id="metricsBar" class="metrics-bar hidden">
        <div class="metric">
            <span class="metric-label">Latency</span>
            <span class="metric-value" id="metricLatency">—</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
            <span class="metric-label">Tokens</span>
            <span class="metric-value" id="metricTokens">—</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
            <span class="metric-label">Warnings</span>
            <span class="metric-value" id="metricWarnings">—</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
            <span class="metric-label">Nodes</span>
            <span class="metric-value" id="metricNodes">—</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
            <span class="metric-label">Status</span>
            <span class="metric-value" id="metricStatus">—</span>
        </div>
    </header>

    <!-- ═══════════ VIEW TOGGLE ═══════════ -->
    <div id="viewToggle" class="view-toggle hidden">
        <button class="toggle-btn active" data-view="graph">Graph</button>
        <button class="toggle-btn" data-view="timeline">Timeline</button>
    </div>

    <!-- ═══════════ FULL-SCREEN GRAPH ═══════════ -->
    <div id="megaGraph"></div>

    <!-- ═══════════ TIMELINE VIEW ═══════════ -->
    <div id="timelineView" class="timeline-view hidden">
        <div class="timeline-header">
            <h3>Execution Timeline</h3>
        </div>
        <div class="timeline-list" id="timelineList"></div>
    </div>

    <!-- ═══════════ FLOATING SIDEBAR ═══════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="logo-orb"></div>
            <span class="brand-text">Synth</span>
            <span class="brand-version">v0.1</span>
        </div>
        <div class="sidebar-controls">
            <div class="input-group">
                <label>Operation</label>
                <select id="modeSelect">
                    <option value="triathlon">triathlon.analyze()</option>
                    <option value="rowing">rowing.analyze()</option>
                    <option value="sync_strava">strava.sync()</option>
                    <option value="sync_sheets">sheets.two_way_sync()</option>
                    <option value="insert_record">sheets.insert_record()</option>
                    <option value="ml_training">ml.train_injury_model()</option>
                </select>
            </div>
            <div class="input-group" id="triathlonInputs">
                <label>Lookback</label>
                <input type="number" id="lookbackDays" value="7" min="1" max="90" placeholder="days">
            </div>
            <div class="input-group" id="rowingInputs" style="display:none;">
                <label>Athlete</label>
                <input type="text" id="athleteName" value="Wheeler, Ella">
            </div>
            <div class="input-group" id="stravaInputs" style="display:none;">
                <label>Access Token</label>
                <button id="connectStravaBtn" style="margin-bottom: 6px; padding: 6px; font-size: 0.8rem; background: rgba(252, 76, 2, 0.2); border: 1px solid #fc4c02; color: #fdba74; border-radius: 4px; cursor: pointer; text-align: center; width: 100%;">Connect Strava</button>
                <input type="text" id="stravaAccessToken" placeholder="Auto-fills after connect">
                <label style="margin-top: 8px;">Google Sheet ID (Optional)</label>
                <input type="text" id="stravaSheetId" placeholder="Paste Sheet ID">
            </div>
            <div class="input-group" id="sheetsInputs" style="display:none;">
                <label>Domain</label>
                <select id="sheetsDomain" style="margin-bottom: 8px;">
                    <option value="triathlon">Triathlon</option>
                    <option value="rowing">Rowing</option>
                </select>
                <label>Google Sheet ID (Optional)</label>
                <input type="text" id="customSheetId" placeholder="Paste Sheet ID">
            </div>
            <div class="input-group" id="insertInputs" style="display:none;">
                <label>JSON Payload</label>
                <textarea id="insertPayload" rows="4" style="width:100%; background: rgba(0,0,0,0.2); border: 1px solid #334155; color: #e2e8f0; font-family: monospace; padding: 6px; font-size: 12px; border-radius: 4px; resize: vertical;">{
  "activity": "Run",
  "duration": "45m",
  "notes": "Test manual entry"
}</textarea>
                <label style="margin-top: 8px;">Target Sheet ID (Optional)</label>
                <input type="text" id="insertSheetId" placeholder="Paste Sheet ID">
            </div>
            <button id="executeBtn" class="btn-execute">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span class="btn-text">Trace Execution</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </div>
        <div class="sidebar-footer">
            <span class="kbd">⌘K</span> Command Palette
        </div>
    </aside>

    <!-- ═══════════ NODE INSPECTOR (Right Panel) ═══════════ -->
    <div id="inspector" class="inspector hidden">
        <div class="inspector-header">
            <div class="inspector-title-row">
                <div class="inspector-status" id="inspectorStatus"></div>
                <h3 id="inspectorTitle">Node Inspector</h3>
            </div>
            <button class="inspector-close" id="inspectorClose">✕</button>
        </div>
        <div class="inspector-body" id="inspectorBody"></div>
    </div>

    <!-- ═══════════ MINIMAP ═══════════ -->
    <div id="minimap" class="minimap hidden">
        <canvas id="minimapCanvas" width="180" height="120"></canvas>
        <div id="minimapViewport" class="minimap-viewport"></div>
    </div>

    <!-- ═══════════ COMMAND PALETTE ═══════════ -->
    <div id="cmdPalette" class="cmd-palette hidden">
        <div class="cmd-backdrop"></div>
        <div class="cmd-modal">
            <input type="text" id="cmdInput" class="cmd-input" placeholder="Type a command…">
            <div class="cmd-list" id="cmdList"></div>
        </div>
    </div>

    <!-- ═══════════ EXPLAIN TOOLTIP ═══════════ -->
    <div id="explainTooltip" class="explain-tooltip hidden">
        <div class="explain-header">
            <span class="explain-icon">💡</span>
            <span>Why?</span>
        </div>
        <div class="explain-body" id="explainBody"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
